<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; background: black; display: flex; align-items: center; justify-content: center; width: 128px; height: 128px; }
    .logo {
      width: 80px;
      height: 80px;
      border: 6px solid white;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .inner {
      width: 30px;
      height: 30px;
      background: white;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <div class="inner"></div>
  </div>
</body>
</html>
