<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stash Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <div class="sidebar-header" id="home-btn" title="Your memory profile">
                <h1>stash<span class="dot">.</span></h1>
                <p>Your archive</p>
            </div>
            <div class="search-box">
                <input type="text" id="dashboard-search" placeholder="Search your stash...">
            </div>
            <div id="search-mode" class="search-mode">
                <button class="mode-btn active" data-mode="filter">Filter</button>
                <button class="mode-btn" data-mode="ask">Ask <span class="pro-tag">Pro</span></button>
            </div>
            <div id="ai-status" class="ai-status hidden"></div>
            <div id="type-filters" class="type-filters">
                <!-- type + source filter chips injected here -->
            </div>
            <div id="tag-filter-container" class="tag-filters">
                <!-- Tags will be injected here -->
            </div>
            <nav id="sidebar-list" class="sidebar-nav">
                <!-- Chat list items (grouped by date) will be injected here -->
            </nav>
            <div class="sidebar-footer">
                <button id="pro-toggle" class="secondary-btn pro-toggle">Pro: off</button>
                <div class="footer-row">
                    <button id="import-all" class="secondary-btn">Import</button>
                    <button id="export-all" class="secondary-btn">Export All</button>
                </div>
                <input type="file" id="import-file" accept="application/json,.json" hidden>
            </div>
        </aside>

        <main class="content">
            <div id="overview" class="overview">
                <div class="ov-head">
                    <p class="ov-eyebrow">Your memory profile</p>
                    <h2 id="ov-identity" class="ov-identity">A quiet place for everything you have asked and read.</h2>
                </div>
                <div id="ov-stats" class="ov-stats"></div>
                <div class="ov-card">
                    <div class="ov-card-head">
                        <h3>Your year in memory</h3>
                        <span id="ov-heat-sub" class="ov-sub"></span>
                    </div>
                    <div id="ov-heatmap" class="ov-heatmap"></div>
                </div>
                <div class="ov-card">
                    <div class="ov-card-head"><h3>What you keep</h3></div>
                    <div id="ov-topics" class="ov-topics"></div>
                </div>
                <div class="ov-card" id="ov-revisit-card">
                    <div class="ov-card-head"><h3>Jump back in</h3></div>
                    <div id="ov-revisit" class="ov-revisit"></div>
                </div>
            </div>
            
            <div id="chat-view" class="chat-view hidden">
                <header class="chat-header">
                    <div class="chat-meta">
                        <div class="title-row">
                            <h2 id="active-chat-title">Conversation</h2>
                        </div>
                        <div class="meta-row">
                            <span id="active-chat-date">Date</span>
                            <div id="active-tags" class="tag-chips-small"></div>
                            <button id="add-tag-btn" class="minimal-btn">+ Tag</button>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button id="continue-chat" class="icon-btn accent" title="Resume in a new ChatGPT thread">Resume (New Chat)</button>
                        <button id="copy-chat" class="icon-btn" title="Copy as Markdown">Copy MD</button>
                        <button id="export-md" class="icon-btn" title="Download as .md file">Export MD</button>
                        <button id="delete-chat" class="icon-btn delete" title="Delete conversation">Delete</button>
                    </div>
                </header>
                <div id="chat-messages" class="messages-container">
                    <div id="chat-summary" class="chat-summary hidden">
                        <div class="summary-head">
                            <h3>Summary</h3>
                            <button id="gen-summary" class="chip-btn">Summarize</button>
                        </div>
                        <p id="summary-text"></p>
                        <div id="suggested-tags" class="suggested-tags"></div>
                    </div>
                    <!-- Messages will be injected here -->
                </div>
            </div>
        </main>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
